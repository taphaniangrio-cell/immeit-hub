<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Générateur d'articles LinkedIn — IMMEIT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- Écran de connexion -->
  <div id="login-screen" class="screen">
    <div class="card">
      <img src="logo-immeit.webp" alt="IMMEIT" class="logo-login">
      <p class="subtitle">Générateur d'articles LinkedIn</p>
      <form id="login-form">
        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" placeholder="Mot de passe" required>
        <button type="submit" class="btn-primary">Se connecter</button>
      </form>
      <p id="login-error" class="error hidden"></p>
    </div>
  </div>

  <!-- Écran principal -->
  <div id="main-screen" class="screen hidden">
    <header>
      <div class="header-left">
        <img src="logo-immeit.webp" alt="IMMEIT" class="logo-header">
        <h1>Articles LinkedIn</h1>
      </div>
      <div class="header-right">
        <div class="ai-selector-inline">
          <select id="ai-provider-main"></select>
          <select id="ai-model-main"></select>
          <span id="ai-key-status-main" class="key-status"></span>
        </div>
        <div class="header-actions">
          <span class="header-divider"></span>
          <button id="btn-new" class="btn-primary">+ Nouvel article</button>
          <button id="btn-logout" class="btn-logout" title="Déconnexion">Déconnexion</button>
        </div>
      </div>
    </header>

    <div class="filters">
      <button class="filter-btn active" data-filter="">Tous</button>
      <button class="filter-btn" data-filter="brouillon">Brouillon</button>
      <button class="filter-btn" data-filter="en_revision">En révision</button>
      <button class="filter-btn" data-filter="valide">Validé</button>
      <button class="filter-btn" data-filter="publie">Publié</button>
      <button class="filter-btn" data-filter="archive">Archivé</button>
    </div>

    <div id="article-list" class="article-list"><div class="empty">Chargement...</div></div>
    <div id="pagination" class="pagination hidden">
      <button id="btn-prev" class="btn-outline">&larr; Précédent</button>
      <span id="page-info"></span>
      <button id="btn-next" class="btn-outline">Suivant &rarr;</button>
    </div>
  </div>

  <!-- Écran éditeur -->
  <div id="editor-screen" class="screen hidden">
    <header>
      <div class="header-left">
        <button id="btn-back" class="btn-outline">&larr; Retour</button>
        <h2 id="editor-title">Nouvel article</h2>
      </div>
      <span id="editor-status" class="badge"></span>
    </header>

    <div id="status-bar" class="status-bar hidden"></div>

    <div class="editor-body">
      <div class="editor-layout">
        <div class="editor-main">
          <div class="field">
            <label>Titre interne</label>
            <input type="text" id="edit-titre" placeholder="Titre interne (non publié)">
          </div>
          <div class="field">
            <label>Corps de l'article <span id="char-count" class="char-count"></span></label>
            <textarea id="edit-corps" rows="14" placeholder="Contenu de l'article..."></textarea>
            <span class="word-count" id="word-count">0 mots</span>
          </div>
          <div class="field">
            <label>Hashtags</label>
            <input type="text" id="edit-hashtags" placeholder="#maintenance #GMAO #fiabilite">
            <div id="hashtag-suggestions" class="hashtag-suggestions"></div>
          </div>
        </div>

        <div class="editor-sidebar">
          <div class="field">
            <label>Source</label>
            <div id="edit-source" class="source-display">—</div>
          </div>
          <div class="field">
            <label>IA · Modèle</label>
            <div id="edit-ia-info" class="source-display">—</div>
          </div>
          <div class="field">
            <label>Dates</label>
            <div id="edit-dates" class="source-display">—</div>
          </div>
          <div class="field">
            <label>Sauvegarde</label>
            <div id="save-indicator" class="save-indicator">—</div>
          </div>
        </div>
      </div>

      <div class="editor-actions">
        <button id="btn-save" class="btn-primary">Enregistrer</button>
        <button id="btn-validate" class="btn-success">Valider</button>
        <button id="btn-copy" class="btn-primary">Copier pour LinkedIn</button>
        <button id="btn-regen" class="btn-outline">Régénérer avec IA</button>
        <button id="btn-archive" class="btn-archive">Archiver</button>
        <button id="btn-restore" class="btn-outline">Restaurer en brouillon</button>
        <button id="btn-delete" class="btn-danger">Supprimer</button>
      </div>

      <div id="regen-box" class="field hidden">
        <label>Consignes pour la régénération</label>
        <textarea id="regen-feedback" rows="3" placeholder="Plus court, plus technique, autre angle..."></textarea>
        <button id="btn-regen-go" class="btn-primary">Confirmer la régénération</button>
      </div>
    </div>
  </div>

  <!-- Modale de sélection d'actualité -->
  <div id="news-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Nouvel article</h2>
        <div class="modal-header-actions">
          <button id="modal-close" class="btn-outline">&times;</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="custom-prompt-section">
          <label for="custom-prompt">Écris un sujet libre (mot-clé, titre, phrase)</label>
          <div class="custom-prompt-row">
            <input type="text" id="custom-prompt" placeholder="Ex: maintenance predictive GMAO, fiabilite pompes industrielles...">
            <button id="btn-custom-generate" class="btn-primary">Générer</button>
          </div>
          <div class="custom-prompt-divider">
            <span>— ou choisis une actualité —</span>
          </div>
        </div>
        <div id="news-list"><div class="empty">Recherche des actualités...</div></div>
        <div class="modal-ai-pick">
          <button id="btn-ai-pick" class="btn-outline">🎲 Laisser l'IA choisir</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>
</div>
<script src="app.js"></script>
</body>
</html>
