name: Sync SharePoint

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          HTTP_CODE=$(curl -s -o /tmp/sync-response.json -w "%{http_code}" \
            -X POST "${{ vars.SYNC_URL || 'https://articles-immeit.vercel.app/api/sync' }}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120)
          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/sync-response.json
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Sync failed with HTTP $HTTP_CODE"
            exit 1
          fi
